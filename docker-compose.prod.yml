services:
  caddy:
    image: caddy:2.8
    container_name: patients-management-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${CADDYFILE_PATH:-./Caddyfile}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

  api:
    build:
      context: ./apps/api
    container_name: patients-management-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      FRONTEND_URL: ${FRONTEND_URL}
      MOCK_LATENCY_ENABLED: ${MOCK_LATENCY_ENABLED}
      MOCK_LATENCY_MIN_MS: ${MOCK_LATENCY_MIN_MS}
      MOCK_LATENCY_MAX_MS: ${MOCK_LATENCY_MAX_MS}
      MOCK_FAILURE_RATE: ${MOCK_FAILURE_RATE}

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: patients-management-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
